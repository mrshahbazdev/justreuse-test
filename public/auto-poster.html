<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Ad Poster - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-xl font-bold mb-4">Auto Ad Poster (Pro)</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">User ID</label>
                <input type="number" id="userId" value="5" class="w-full border rounded p-2 text-sm">
            </div>

            <button onclick="startPostingProcess()" id="postBtn" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 font-bold transition">
                Post Free Random Ad
            </button>
            <button onclick="checkMyPosts()" id="checkBtn" class="w-full bg-gray-600 text-white p-2 rounded hover:bg-gray-700 font-bold transition">
                Check My Latest Ad Status
            </button>
        </div>

        <div id="status" class="mt-4 p-2 text-sm rounded hidden"></div>
        <div id="resultDisplay" class="mt-4 p-4 border rounded bg-gray-50 hidden"></div>
    </div>

    <script>
        const BASE_URL = "https://www.justreused.com/api";
        const PRODUCTS = [
            { title: "iPhone 14 Pro", desc: "High quality iPhone 14 Pro available in excellent condition. No scratches, comes with original box and charger." },
            { title: "Gaming Laptop ASUS ROG", desc: "Powerful gaming laptop with RTX 3060, 16GB RAM, 512GB SSD. Perfect for gaming and development." },
            { title: "Leather Handbag Designer", desc: "Genuine leather designer handbag, barely used. Premium quality with dust bag included." },
            { title: "Ergonomic Office Chair", desc: "Adjustable ergonomic office chair with lumbar support. Great for work from home setup." },
            { title: "Samsung Galaxy S24 Ultra", desc: "Samsung Galaxy S24 Ultra, 256GB, Titanium Black. Like new condition with warranty." },
            { title: "Sony PlayStation 5", desc: "PS5 disc edition with 2 controllers and 3 games. Excellent condition, barely used." },
            { title: "Apple MacBook Air M2", desc: "MacBook Air M2 chip, 8GB RAM, 256GB SSD. Space Gray, mint condition with AppleCare+." },
            { title: "Nike Air Jordan 1 Retro", desc: "Original Nike Air Jordan 1 Retro High OG, size 42. Brand new in box, never worn." }
        ];

        function getUserId() {
            return document.getElementById('userId').value || 5;
        }

        function showStatus(msg, type) {
            const statusDiv = document.getElementById('status');
            const colors = { info: 'bg-blue-100', success: 'bg-green-100', error: 'bg-red-100' };
            statusDiv.className = `mt-4 p-2 text-sm rounded ${colors[type] || colors.info} block`;
            statusDiv.innerText = msg;
        }

        async function startPostingProcess() {
            const resultDisplay = document.getElementById('resultDisplay');
            resultDisplay.classList.add("hidden");
            showStatus("Step 1/3: Fetching categories & packages...", "info");

            try {
                // Step 1: Get categories and packages
                const metaRes = await fetch(`${BASE_URL}/post/create-data`);
                const metaData = await metaRes.json();

                if (!metaData.success) {
                    showStatus("Error fetching create data: " + JSON.stringify(metaData), "error");
                    return;
                }

                const data = metaData.data;

                // Find free package (price == 0 or short_name == 'free')
                const freePkg = data.packages.find(p => 
                    p.short_name === 'free' || p.price == 0
                ) || data.packages[0];

                if (!freePkg) {
                    showStatus("No packages found!", "error");
                    return;
                }

                // Step 2: Get sub-categories from first parent
                showStatus("Step 2/3: Fetching sub-categories...", "info");
                const parentCat = data.categories[0];
                const subRes = await fetch(`${BASE_URL}/categories/sub/${parentCat.id}`);
                const subData = await subRes.json();

                // Use sub-category if available, otherwise parent (API auto-resolves)
                let categoryId = parentCat.id;
                if (subData.success && subData.data && subData.data.length > 0) {
                    // Random sub-category
                    const randomSub = subData.data[Math.floor(Math.random() * subData.data.length)];
                    categoryId = randomSub.id;
                }

                // Random product
                const product = PRODUCTS[Math.floor(Math.random() * PRODUCTS.length)];
                const price = Math.floor(Math.random() * 50000) + 1000;

                // Step 3: Create post
                showStatus("Step 3/3: Creating ad...", "info");

                const payload = {
                    user_id: parseInt(getUserId()),
                    title: product.title,
                    category_id: categoryId,
                    package_id: freePkg.id,
                    price: price,
                    description: product.desc,
                    country_short: "PK",
                    country_long: "Pakistan",
                    state_short: "PB",
                    state_long: "Punjab",
                    city_name: "Lahore",
                    main_city_name: "Lahore"
                };

                console.log("Sending payload:", payload);

                const res = await fetch(`${BASE_URL}/post/store`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await res.json();
                console.log("API Response:", result);

                if (result.success) {
                    showStatus("Ad created successfully!", "success");
                    resultDisplay.classList.remove("hidden");
                    resultDisplay.innerHTML = `
                        <p class="font-bold">${product.title}</p>
                        <p class="text-sm text-gray-600">Price: Rs. ${price.toLocaleString()}</p>
                        <p class="text-sm text-gray-600">Post ID: ${result.post_id}</p>
                        <p class="text-sm text-gray-600">Active: ${result.active ? 'Yes ✅' : 'Pending Payment'}</p>
                        <p class="text-sm text-gray-600">Type: ${result.type}</p>
                        ${result.url ? `<p class="mt-2"><a href="${result.url}" target="_blank" class="text-blue-500 underline">View Ad →</a></p>` : ''}
                    `;
                } else {
                    showStatus("Error: " + (result.message || JSON.stringify(result.errors)), "error");
                    console.error("Full error:", result);
                }
            } catch (err) {
                showStatus("Network Error: " + err.message, "error");
                console.error(err);
            }
        }

        async function checkMyPosts() {
            showStatus("Checking posts...", "info");
            const resultDisplay = document.getElementById('resultDisplay');

            try {
                const res = await fetch(`${BASE_URL}/post/my-posts?user_id=${getUserId()}`);
                const data = await res.json();

                if (data.success && data.data && data.data.length > 0) {
                    const posts = data.data.slice(0, 5); // Show latest 5
                    showStatus(`Found ${data.data.length} post(s)`, "success");
                    resultDisplay.classList.remove("hidden");
                    resultDisplay.innerHTML = posts.map(p => `
                        <div class="border-b pb-2 mb-2 last:border-0">
                            <p class="font-bold text-sm">${p.title}</p>
                            <p class="text-xs text-gray-500">
                                Active: ${p.active ? 'Yes ✅' : 'No ❌'} | 
                                Views: ${p.views_count} |
                                ${p.created_at}
                            </p>
                            <a href="${p.url}" target="_blank" class="text-blue-500 text-xs underline">View →</a>
                        </div>
                    `).join('');
                } else {
                    showStatus("No posts found for this user.", "info");
                    resultDisplay.classList.add("hidden");
                }
            } catch (err) {
                showStatus("Error: " + err.message, "error");
            }
        }
    </script>
</body>
</html>
